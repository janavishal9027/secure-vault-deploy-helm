#this is for creating a secret which will have Job details for additional scrape configs. App teams can override the secret to have more jobs.


apiVersion: v1
data:
  prometheus-additional.yaml: 
kind: Secret
metadata:
  annotations:
    meta.helm.sh/release-name: prometheus
    meta.helm.sh/release-namespace: infra
  labels:
    app.kubernetes.io/managed-by: Helm
  name: additional-scrape-configs
