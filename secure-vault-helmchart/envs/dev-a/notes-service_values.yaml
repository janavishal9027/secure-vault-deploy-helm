microservices:
  notes-service:
    enabled: true
    port: 3213
    image:
      repo: kittuvittu/secure-vault-notes
    ingress:
      path: /notes
    env:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://10.86.216.71:5432/digital-notes?currentSchema=secure-vault"
      SPRING_DATASOURCE_USERNAME: "postgres"
      SECURITY_JWT_EXPIRATION_TIME: "1800000"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "10.86.216.71:9092"
      DIGITAL_APP_AUTHENTICATION: "http://authentication-service.secure-vault-dev-a.svc.cluster.local/authentication"
      AI_CORE_BASE_URL: "http://ai-core-service.secure-vault-dev-a.svc.cluster.local:8001"
      AI_WORKER_BASE_URL: "http://ai-worker-service.secure-vault-dev-a.svc.cluster.local:8000"
      SWAGGER_ENABLED: "true"
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
    secretEnv:
      SPRING_DATASOURCE_PASSWORD:
        secretName: secure-vault-db
        key: password
      SECURITY_JWT_SECRET_KEY:
        secretName: secure-vault-jwt
        key: secret
      OPENAI_API_KEY:
        secretName: secure-vault-ai
        key: openaiApiKey
    # Hibernate + Kafka consumer + 25MB multipart audio uploads.
    resources:
      requests:
        cpu: "150m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "768Mi"
    probes:
      readiness:
        initialDelaySeconds: 25
