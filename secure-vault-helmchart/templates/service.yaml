{{- range $name, $svc := .Values.microservices }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-service
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "sv.labels" (dict "name" $name "release" $.Release.Name) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ $name }}
  ports:
    - protocol: TCP
      port: {{ default 80 $svc.servicePort }}
      targetPort: {{ $svc.port }}
{{- end }}
{{- end }}
