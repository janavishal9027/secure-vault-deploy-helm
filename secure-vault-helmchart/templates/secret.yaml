{{/*
Render one k8s Secret per entry under .Values.secrets. Per-service values
files reference these Secrets by name via secretEnv.<KEY>.secretName.

WARNING: plaintext values committed in git. Migrate to External Secrets
Operator + Vault before opening the repo more widely.
*/}}
{{- range $name, $data := .Values.secrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ $.Release.Name | default "Helm" }}
type: Opaque
stringData:
  {{- range $key, $value := $data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
