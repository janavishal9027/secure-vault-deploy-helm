{{- range $name, $svc := .Values.microservices }}
{{- if and $svc.enabled $svc.ingress }}
{{- if $svc.ingress.stripPrefix }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $name }}-stripprefix
  namespace: {{ $.Values.namespace }}
spec:
  stripPrefix:
    prefixes:
      - {{ $svc.ingress.path }}
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}-ingress
  namespace: {{ $.Values.namespace }}
  annotations:
    {{- $ann := merge (dict) ($svc.ingress.annotations | default dict) $.Values.ingressAnnotations -}}
    {{- if $svc.ingress.stripPrefix }}
    {{- $_ := set $ann "traefik.ingress.kubernetes.io/router.middlewares" (printf "%s-%s-stripprefix@kubernetescrd" $.Values.namespace $name) }}
    {{- end }}
    {{- toYaml $ann | nindent 4 }}
  labels:
    {{- include "sv.labels" (dict "name" $name "release" $.Release.Name) | nindent 4 }}
spec:
  ingressClassName: traefik
  rules:
    - host: {{ default $.Values.ingressHost $svc.ingress.host }}
      http:
        paths:
          - path: {{ $svc.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}-service
                port:
                  number: {{ default 80 $svc.servicePort }}
{{- end }}
{{- end }}
